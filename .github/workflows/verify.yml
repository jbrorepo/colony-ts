name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so PR pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-all:
    name: bun verify:all + tsc
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Print bun + node versions
        run: |
          bun --version
          node --version

      - name: Run full verification gate (387 phases + tsc --noEmit)
        # verify:all is a chained `&&` script; first failing phase aborts the
        # run and surfaces a non-zero exit. tsc --noEmit is the final link.
        run: bun run verify:all

      - name: Compile binary
        # Mirrors `release:gate`'s final step. Catches build-system issues that
        # the typecheck alone won't surface.
        run: bun run build

      - name: Upload compiled binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: colony-binary-${{ github.sha }}
          path: colony
          if-no-files-found: error
          retention-days: 14
