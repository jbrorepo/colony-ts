name: Deploy plugin registry to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - ".github/workflows/deploy-registry.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "registry-pages"
  cancel-in-progress: false

jobs:
  build:
    name: Validate + package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate registry tests still pass
        run: |
          bun install --frozen-lockfile
          bun test src/__tests__/mcp/plugin-registry-client.test.ts

      - name: Package registry as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./registry

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
